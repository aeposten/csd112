<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A digital family album celebrating the Mullins family."
    />
    <title>Mullins Family Album</title>
    <link rel="stylesheet" href="scripts/final-styles.css" />
  </head>
  <body>
    <header class="site-header" role="banner">
      <h1 class="site-title">Mullins Family Album</h1>
      <nav aria-label="Site navigation">
        <ul class="site-nav">
          <li><a href="family-members/amy/amy.html">Amy</a></li>
          <li><a href="family-members/galen/galen.html">Galen</a></li>
          <li><a href="family-members/helmi/helmi.html">Helmi</a></li>
          <li><a href="family-members/irene/irene.html">Irene</a></li>
          <li><a href="family-members/magnus/magnus.html">Magnus</a></li>
        </ul>
      </nav>
    </header>

    <main class="home-grid" aria-label="Family member gallery">
      <!-- Cell 1: Amy -->
      <a href="family-members/amy/amy.html" class="grid-cell cell-1">
        <img
          src="family-members/amy/assets/amy-kitten.jpeg"
          alt="Amy grinning with a tiny black kitten perched on her shoulder in a veterinary office"
        />
        <span class="cell-label">Amy</span>
      </a>

      <!-- Cell 2: Helmi -->
      <a href="family-members/helmi/helmi.html" class="grid-cell cell-2">
        <img
          src="family-members/helmi/assets/helmi-tongue.jpeg"
          alt="Helmi leaning toward the camera from the grass and sticking out her tongue, wearing purple glasses"
        />
        <span class="cell-label">Helmi</span>
      </a>

      <!-- Cell 3: Galen -->
      <a href="family-members/galen/galen.html" class="grid-cell cell-3">
        <img
          src="family-members/galen/assets/galen-baby-irene.jpeg"
          alt="Galen holding newborn Irene in the NICU, wearing a hospital wristband"
        />
        <span class="cell-label">Galen</span>
      </a>

      <!-- Cell 4: Magnus -->
      <a href="family-members/magnus/magnus.html" class="grid-cell cell-4">
        <img
          src="family-members/magnus/assets/magnus-ball.jpeg"
          alt="Magnus the boxer dog standing outdoors proudly holding a tennis ball in his mouth"
        />
        <span class="cell-label">Magnus</span>
      </a>

      <!-- Cell 5: Sisters -->
      <a href="family-members/sisters/sisters.html" class="grid-cell cell-5">
        <img
          src="family-members/sisters/assets/sisters-bw.jpeg"
          alt="Helmi lying cheek to cheek with baby Irene on a bed, holding hands, black and white photo"
        />
        <span class="cell-label">Sisters</span>
      </a>

      <!-- Cell 6: Irene -->
      <a href="family-members/irene/irene.html" class="grid-cell cell-6">
        <img
          src="family-members/irene/assets/irene-cart.jpeg"
          alt="Irene sitting in a Metropolitan Market shopping cart wearing a bright pink fleece, reaching out toward the camera"
        />
        <span class="cell-label">Irene</span>
      </a>

      <!-- Cell 7: Title cell -->
      <div class="grid-cell grid-cell--title cell-7">
        <p class="album-title">Mullins<br />Family<br />Album</p>
        <p class="album-subtitle">Est. 2011</p>
      </div>
    </main>

    <footer class="site-footer" role="contentinfo">
      &copy; Mullins Family Album | Created by Amy Posten
    </footer>
  </body>
</html>
